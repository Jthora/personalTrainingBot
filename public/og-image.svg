<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#040709"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A7FFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5A7FFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle top glow -->
  <ellipse cx="600" cy="0" rx="600" ry="300" fill="url(#glow)"/>

  <!-- Shield icon (scaled and centered at left-center) -->
  <g transform="translate(180, 115) scale(0.78)">
    <!-- Shield body -->
    <path d="M256 56 L420 130 L420 270 Q420 390 256 460 Q92 390 92 270 L92 130 Z"
          fill="none" stroke="#5A7FFF" stroke-width="10" opacity="0.9"/>
    <!-- Inner shield glow -->
    <path d="M256 80 L400 145 L400 268 Q400 375 256 440 Q112 375 112 268 L112 145 Z"
          fill="#0a1628" opacity="0.6"/>
    <!-- Wing left -->
    <path d="M256 200 Q180 140 110 180 Q140 220 190 230 Q150 200 180 180 Q210 210 240 220 Z"
          fill="#5A7FFF" opacity="0.8"/>
    <!-- Wing right -->
    <path d="M256 200 Q332 140 402 180 Q372 220 322 230 Q362 200 332 180 Q302 210 272 220 Z"
          fill="#5A7FFF" opacity="0.8"/>
    <!-- Central star -->
    <polygon points="256,160 268,210 320,210 278,240 292,290 256,260 220,290 234,240 192,210 244,210"
             fill="#5A7FFF"/>
    <!-- AK text -->
    <text x="256" y="380" font-family="'Aldrich', sans-serif" font-weight="bold" font-size="64"
          fill="#5A7FFF" text-anchor="middle" dominant-baseline="middle">AK</text>
  </g>

  <!-- Title text -->
  <text x="680" y="230" font-family="'Aldrich', 'Segoe UI', system-ui, sans-serif" font-weight="bold" font-size="56"
        fill="#E3ECFF" text-anchor="middle" letter-spacing="0.04em">STARCOM ACADEMY</text>

  <!-- Divider line -->
  <line x1="530" y1="260" x2="830" y2="260" stroke="#5A7FFF" stroke-width="2" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="680" y="305" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="24"
        fill="#8BA3D9" text-anchor="middle" letter-spacing="0.08em">EARTH ALLIANCE OFFICER TRAINING</text>

  <!-- Stats line -->
  <text x="680" y="370" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18"
        fill="#5A7FFF" text-anchor="middle" opacity="0.8">19 MODULES · 663 DECKS · 3,231 TRAINING CARDS</text>

  <!-- Domain tags -->
  <text x="680" y="420" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15"
        fill="#6B82B8" text-anchor="middle" letter-spacing="0.06em">COMBAT · INTELLIGENCE · CYBER · PSIONIC · STRATEGIC · SOVEREIGNTY</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#5A7FFF" opacity="0.15"/>

  <!-- URL -->
  <text x="600" y="560" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16"
        fill="#4A6299" text-anchor="middle" letter-spacing="0.1em">academy.starcom.app</text>

  <!-- Offline-first badge -->
  <text x="600" y="590" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13"
        fill="#3D5280" text-anchor="middle" letter-spacing="0.08em">SOVEREIGN · OFFLINE-FIRST · PWA</text>
</svg>
